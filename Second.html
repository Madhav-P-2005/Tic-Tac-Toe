<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tic - Tac - Toe </title>
    <link rel="stylesheet" href="Style2.css">

</head>
<body>
    <div class="Back">
    <p class="Back-text" onclick="HomePage()"><img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/circled-left-2.png" alt="circled-left-2" /> Home Page </p>
    </div>
    <h1 class="head"> Choose your Mode 🤔❓ </h1>

    <div class="mode-container">
        <div class="computer-mode"> 🖥️ Play Against Computer </div>
        <div class="duo-mode"> 🫂 Play with a Friend </div>
    </div>

    <!--  Game & Scoreboard Container -->
    <div class="game-container">
        <!-- Board for playing against computer -->
        <div class="Board1">
            <div class="cell" id="0"></div>
            <div class="cell" id="1"></div>
            <div class="cell" id="2"></div>
            <div class="cell" id="3"></div>
            <div class="cell" id="4"></div>
            <div class="cell" id="5"></div>
            <div class="cell" id="6"></div>
            <div class="cell" id="7"></div>
            <div class="cell" id="8"></div>
        </div>

        <!-- Scoreboard (Right Side) -->
        <div class="box">
            <label class="result"> </label>
        </div>
    </div>

    <div class="game-container">
        <!-- Board for playing with a friend -->
        <div class="Board2">
            <div class="cell" id="0"></div>
            <div class="cell" id="1"></div>
            <div class="cell" id="2"></div>
            <div class="cell" id="3"></div>
            <div class="cell" id="4"></div>
            <div class="cell" id="5"></div>
            <div class="cell" id="6"></div>
            <div class="cell" id="7"></div>
            <div class="cell" id="8"></div>
        </div>

        <!--  Scoreboard (Right Side) -->
        <div class="box2">
            <label class="result2"> </label>
        </div>
    </div>

    <script src="Logic.js"></script>
</body>

</html>
